<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Create Label</title>

    <link rel="preconnect" href="https://fonts./googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=The+Girl+Next+Door&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="createLabelStyle.css" />
  </head>

  <body>
    <div class="app">
      <div class="first_seg">
            <div class="top-part">Add Label</div>
            <div class="icon_wrapper">
                <img class="minu_button" src="-Button.png" alt="minus button">
                <img class="clos_button" src="Xbutton.png" alt="close button">
            </div>
      </div>

      <div class="input_container">
            <div class="cont1">
              <input class="add_label" maxlength="10">
              <div class="replaces_Text"> Replaces: </div>
            </div>
            <div class="dropdown_select_cont" >
              <div class="small_circle dropdown_select"></div>
              <div class="dropdown_options">
              </div>
            </div>
            
      </div>  
      <div class="create_button_cont">
        <button class = "create_button">Create Label</button>
        
      </div>
    </div>

    <script src="addLabel.js"></script>
  </body>
</html>
